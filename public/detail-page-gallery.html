<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Detail Pages | Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #F8F7F4;
  --navy:     #1a1a2e;
  --gold:     #C9A84C;
  --muted:    #8a8070;
  --card-bg:  #ffffff;
}

body {
  font-family: 'Outfit', 'Noto Sans KR', sans-serif;
  background-color: var(--bg);
  color: var(--navy);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ── Page wrapper ── */
.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 2.5rem 3rem 6rem;
}

/* ── Back button ── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.88rem;
  color: var(--muted);
  transition: color 0.2s, gap 0.2s;
  margin-bottom: 2.5rem;
}
.back-btn:hover { color: var(--navy); gap: 0.75rem; }
.back-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ── Header ── */
.page-header { margin-bottom: 3rem; }

.page-title {
  font-family: 'Playfair Display', 'Noto Sans KR', serif;
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--navy);
  margin-bottom: 0.75rem;
}

.page-subtitle {
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  color: var(--muted);
  letter-spacing: 0.02em;
  margin-bottom: 1.75rem;
}

/* gold divider */
.gold-line {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, var(--gold) 0%, rgba(201,168,76,0.15) 60%, transparent 100%);
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.25rem;
  margin-top: 3rem;
}

/* ── Card ── */
.card {
  border-radius: 8px;
  overflow: hidden;
  background: var(--card-bg);
  box-shadow: 0 2px 12px rgba(26,26,46,0.07);
  display: block;
  position: relative;
  opacity: 0;
  transform: translateY(28px);
  animation: fadeInUp 0.55s ease forwards;
}

.card-img-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 3 / 4;
}

.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.85) saturate(0.9);
  transition: filter 0.35s ease, transform 0.35s ease;
}

/* hover overlay */
.card-overlay {
  position: absolute;
  inset: 0;
  background: rgba(26,26,46,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.35s ease;
}
.card-overlay span {
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.06em;
  transform: translateY(6px);
  transition: transform 0.35s ease;
}

.card:hover .card-img-wrap img {
  filter: brightness(1) saturate(1.1);
  transform: scale(1.06);
}
.card:hover {
  box-shadow: 0 12px 32px rgba(26,26,46,0.18);
}
.card:hover .card-overlay { opacity: 1; }
.card:hover .card-overlay span { transform: translateY(0); }

/* card label */
.card-label {
  padding: 0.7rem 0.9rem 0.8rem;
  border-top: 2px solid transparent;
  transition: border-color 0.35s ease;
}
.card:hover .card-label { border-color: var(--gold); }

.card-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: -0.01em;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Fade-in animation ── */
@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ── */
@media (max-width: 1024px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 700px) {
  .page { padding: 1.75rem 1.25rem 4rem; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; margin-top: 2rem; }
  .page-title { font-size: clamp(1.8rem, 8vw, 2.5rem); }
}
@media (max-width: 380px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Back -->
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9.5 3L5 7.5L9.5 12" stroke="currentColor" stroke-width="1.7"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    포트폴리오로 돌아가기
  </a>

  <!-- Header -->
  <header class="page-header">
    <h1 class="page-title">Shopping Detail Pages</h1>
    <p class="page-subtitle">쇼핑몰 상세페이지 작업물 모음 &middot; 2026</p>
    <div class="gold-line"></div>
  </header>

  <!-- Grid — JS로 생성 -->
  <div class="grid" id="grid"></div>

</div>

<script>
/* ──────────────────────────────────────────────────────────
   작업물 데이터 — img, url 만 교체하면 카드가 자동으로 업데이트됩니다.
────────────────────────────────────────────────────────── */
const works = [
  { title: "상품명 A 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 B 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 C 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 D 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 E 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 F 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 G 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 H 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 I 상세페이지", img: "detail-placeholder.svg", url: "#" },
  { title: "상품명 J 상세페이지", img: "detail-placeholder.svg", url: "#" },
];

const grid = document.getElementById('grid');

works.forEach((item, i) => {
  const a = document.createElement('a');
  a.href   = item.url;
  a.target = '_blank';
  a.rel    = 'noopener noreferrer';
  a.className = 'card';
  a.style.animationDelay = `${i * 0.07}s`;

  a.innerHTML = `
    <div class="card-img-wrap">
      <img src="${item.img}" alt="${item.title}" loading="lazy">
      <div class="card-overlay"><span>View &rarr;</span></div>
    </div>
    <div class="card-label">
      <p class="card-title">${item.title}</p>
    </div>
  `;

  grid.appendChild(a);
});
</script>
</body>
</html>
