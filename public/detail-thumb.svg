<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <linearGradient id="card-shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.01)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- ── Browser window 1 (back) ── -->
  <g opacity="0.28">
    <rect x="95" y="95" width="430" height="275" rx="7" fill="rgba(255,255,255,0.04)" stroke="white" stroke-width="1.2"/>
    <rect x="95" y="95" width="430" height="26" rx="7" fill="rgba(255,255,255,0.07)"/>
    <circle cx="114" cy="108" r="4" fill="rgba(255,255,255,0.4)"/>
    <circle cx="128" cy="108" r="4" fill="rgba(255,255,255,0.4)"/>
    <circle cx="142" cy="108" r="4" fill="rgba(255,255,255,0.4)"/>
    <rect x="165" y="101" width="200" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- ── Browser window 2 (mid) ── -->
  <g opacity="0.55">
    <rect x="150" y="68" width="440" height="285" rx="7" fill="rgba(255,255,255,0.04)" stroke="white" stroke-width="1.3"/>
    <rect x="150" y="68" width="440" height="26" rx="7" fill="rgba(255,255,255,0.08)"/>
    <circle cx="170" cy="81" r="4" fill="rgba(255,80,70,0.6)"/>
    <circle cx="186" cy="81" r="4" fill="rgba(255,200,50,0.6)"/>
    <circle cx="202" cy="81" r="4" fill="rgba(80,200,80,0.6)"/>
    <rect x="228" y="74" width="210" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
  </g>

  <!-- ── Browser window 3 (front) ── -->
  <rect x="210" y="50" width="490" height="340" rx="8" fill="rgba(18,18,35,0.82)"/>
  <rect x="210" y="50" width="490" height="340" rx="8" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="210" y="50" width="490" height="30" rx="8" fill="rgba(255,255,255,0.10)"/>
  <circle cx="232" cy="65" r="5" fill="rgba(255,80,70,0.75)"/>
  <circle cx="250" cy="65" r="5" fill="rgba(255,200,50,0.75)"/>
  <circle cx="268" cy="65" r="5" fill="rgba(80,200,80,0.75)"/>
  <!-- address bar -->
  <rect x="300" y="57" width="230" height="16" rx="8" fill="rgba(255,255,255,0.09)"/>
  <rect x="312" y="62" width="100" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>

  <!-- ── Product detail layout inside window ── -->
  <!-- Left: product image block -->
  <rect x="226" y="96" width="160" height="210" rx="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- image placeholder icon -->
  <rect x="246" y="120" width="120" height="90" rx="4" fill="rgba(255,255,255,0.05)"/>
  <line x1="246" y1="120" x2="366" y2="210" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="366" y1="120" x2="246" y2="210" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- mini thumbnails row -->
  <rect x="246" y="222" width="30" height="22" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="282" y="222" width="30" height="22" rx="3" fill="rgba(201,168,76,0.35)"/>
  <rect x="318" y="222" width="30" height="22" rx="3" fill="rgba(255,255,255,0.12)"/>

  <!-- Right: product info -->
  <!-- product title lines -->
  <rect x="404" y="98"  width="180" height="11" rx="5" fill="rgba(255,255,255,0.45)"/>
  <rect x="404" y="116" width="130" height="8"  rx="4" fill="rgba(255,255,255,0.22)"/>
  <!-- gold divider -->
  <rect x="404" y="132" width="60"  height="2"  rx="1" fill="#C9A84C" opacity="0.8"/>
  <!-- price -->
  <rect x="404" y="144" width="110" height="18" rx="5" fill="#C9A84C" opacity="0.22"/>
  <rect x="410" y="149" width="75"  height="8"  rx="4" fill="#C9A84C" opacity="0.7"/>
  <!-- detail lines -->
  <rect x="404" y="174" width="172" height="6" rx="3" fill="rgba(255,255,255,0.14)"/>
  <rect x="404" y="186" width="148" height="6" rx="3" fill="rgba(255,255,255,0.14)"/>
  <rect x="404" y="198" width="162" height="6" rx="3" fill="rgba(255,255,255,0.14)"/>
  <rect x="404" y="210" width="136" height="6" rx="3" fill="rgba(255,255,255,0.14)"/>
  <rect x="404" y="222" width="155" height="6" rx="3" fill="rgba(255,255,255,0.10)"/>
  <!-- CTA button -->
  <rect x="404" y="242" width="130" height="32" rx="6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="406" y="244" width="126" height="28" rx="5" fill="rgba(255,255,255,0.05)"/>
  <text x="469" y="264" font-family="Noto Sans KR, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="1">구매하기</text>

  <!-- Bottom card strip inside window -->
  <rect x="226" y="320" width="462" height="52" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <rect x="238" y="330" width="34" height="32" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="282" y="336" width="110" height="7"  rx="3" fill="rgba(255,255,255,0.22)"/>
  <rect x="282" y="349" width="80"  height="6"  rx="3" fill="rgba(201,168,76,0.4)"/>
  <rect x="560" y="336" width="60"  height="16" rx="4" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- ── Shopping bag icon (bottom right) ── -->
  <g transform="translate(700,418)">
    <path d="M-22,28 L-26,-10 L26,-10 L22,28 Z"
          fill="none" stroke="#C9A84C" stroke-width="2.2" stroke-linejoin="round" opacity="0.85"/>
    <path d="M-11,-10 Q-11,-28 0,-28 Q11,-28 11,-10"
          fill="none" stroke="#C9A84C" stroke-width="2.2" opacity="0.85"/>
    <circle cx="0" cy="4" r="3" fill="#C9A84C" opacity="0.6"/>
  </g>

  <!-- "detail page" label -->
  <text x="400" y="478"
        font-family="Outfit, Arial, sans-serif"
        font-size="14"
        font-weight="400"
        fill="rgba(255,255,255,0.45)"
        text-anchor="middle"
        letter-spacing="5">detail page</text>
</svg>
