<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 쇼츠 모음 | Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Jua&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Outfit', 'Noto Sans KR', sans-serif;
  background: linear-gradient(160deg, #87CEEB 0%, #c8e9f8 50%, #E0F4FF 100%);
  min-height: 100vh;
  color: #1a1a2e;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a {
  color: inherit;
  text-decoration: none;
}

/* ── Page wrapper ── */
.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.5rem 3rem 5rem;
}

/* ── Back button ── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 400;
  color: rgba(26,26,46,0.65);
  transition: color 0.2s ease, gap 0.2s ease;
  margin-bottom: 3rem;
}
.back-btn:hover {
  color: #1a1a2e;
  gap: 0.75rem;
}
.back-btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

/* ── Header ── */
.page-header {
  margin-bottom: 3.5rem;
}
.page-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.15;
  margin-bottom: 0.6rem;
}
.page-subtitle {
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  color: rgba(26,26,46,0.55);
  letter-spacing: 0.01em;
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}

/* ── Card ── */
.card {
  background: #ffffff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1),
              box-shadow 0.3s cubic-bezier(0.16,1,0.3,1);
  display: flex;
  flex-direction: column;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.14);
}

/* 9:16 thumbnail */
.card-thumb {
  width: 100%;
  aspect-ratio: 9 / 16;
  background: #f4f4f8;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  position: relative;
  overflow: hidden;
}

/* real thumbnail image (YouTube etc.) */
.thumb-img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* fallback placeholder when no image */
.thumb-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  width: 100%;
  height: 100%;
}
.thumb-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.thumb-icon svg {
  width: 32px;
  height: 32px;
}
.thumb-number {
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  color: rgba(100,100,120,0.6);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* platform badge */
.platform-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 8px 4px 5px;
  border-radius: 20px;
  color: white;
  backdrop-filter: blur(4px);
}
.badge-youtube   { background: rgba(255,0,0,0.88); }
.badge-instagram { background: linear-gradient(135deg,rgba(240,148,51,0.92),rgba(220,39,67,0.92),rgba(188,24,136,0.92)); }
.badge-tiktok    { background: rgba(1,1,1,0.82); }
.badge-icon { width: 13px; height: 13px; flex-shrink: 0; }

/* card body */
.card-body {
  padding: 1rem 1.1rem 1.2rem;
  flex: 1;
  display: flex;
  align-items: center;
}
.card-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.92rem;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.4;
  color: #1a1a2e;
}

/* ── Responsive ── */

/* ── Responsive ── */
@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .page { padding: 1.75rem 1.25rem 4rem; }
  .grid { grid-template-columns: 1fr; }
  .card-thumb { aspect-ratio: 3 / 4; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Back -->
  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    포트폴리오로 돌아가기
  </a>

  <!-- Header -->
  <header class="page-header">
    <h1 class="page-title">📱 상품 쇼츠 모음</h1>
    <p class="page-subtitle">인스타그램 · 유튜브 · 틱톡 쇼츠 콘텐츠</p>
  </header>

  <!-- Grid — populated by JS -->
  <div class="grid" id="grid"></div>

</div>

<script>
/* ─────────────────────────────────────────────────────────
   쇼츠 데이터 — 이 배열만 수정하면 카드가 자동으로 생성됩니다.
───────────────────────────────────────────────────────── */
const shorts = [
  { title: "상품 쇼츠 1", platform: "youtube",   url: "https://youtube.com/shorts/6lWRJyH3TZU?feature=share" },
  { title: "상품 쇼츠 2", platform: "youtube",   url: "https://youtube.com/shorts/mJRxH4H_yO0?feature=share" },
  { title: "상품 쇼츠 3", platform: "instagram", url: "#" },
  { title: "상품 쇼츠 4", platform: "tiktok",    url: "#" },
];

/* ── YouTube 영상 ID 추출 ── */
function getYouTubeId(url) {
  const m = url.match(/(?:shorts\/|v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

/* ── 플랫폼별 썸네일 URL ── */
function getThumbnail(item) {
  if (item.platform === 'youtube') {
    const id = getYouTubeId(item.url);
    if (id) return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  }
  return null;
}

/* ── 카드 썸네일 영역 HTML ── */
const placeholderIcons = {
  youtube: `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="56" height="56" rx="14" fill="#FF0000"/>
    <polygon points="22,17 22,39 42,28" fill="white"/>
  </svg>`,
  instagram: `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ig2" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
        <stop offset="0%"   stop-color="#f09433"/>
        <stop offset="50%"  stop-color="#dc2743"/>
        <stop offset="100%" stop-color="#bc1888"/>
      </linearGradient>
    </defs>
    <rect width="56" height="56" rx="14" fill="url(#ig2)"/>
    <rect x="10" y="10" width="36" height="36" rx="8" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="28" cy="28" r="9" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="40" cy="16" r="3" fill="white"/>
  </svg>`,
  tiktok: `<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="56" height="56" rx="14" fill="#010101"/>
    <g transform="translate(-1.5,1.5)">
      <circle cx="24" cy="36" r="7" fill="#20D9D2"/>
      <rect x="30" y="14" width="5" height="29" fill="#20D9D2"/>
      <path d="M35,14 Q46,14 46,23 Q46,30 35,30" fill="#20D9D2"/>
    </g>
    <g transform="translate(1.5,-1.5)">
      <circle cx="24" cy="36" r="7" fill="#EE1D52"/>
      <rect x="30" y="14" width="5" height="29" fill="#EE1D52"/>
      <path d="M35,14 Q46,14 46,23 Q46,30 35,30" fill="#EE1D52"/>
    </g>
    <circle cx="24" cy="36" r="7" fill="white"/>
    <rect x="30" y="14" width="5" height="29" fill="white"/>
    <path d="M35,14 Q46,14 46,23 Q46,30 35,30" fill="white"/>
  </svg>`,
};

/* ── 배지용 소형 아이콘 ── */
const badgeIcons = {
  youtube: `<svg class="badge-icon" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="13" height="13" rx="3" fill="white" fill-opacity="0.25"/>
    <polygon points="5,3.5 5,9.5 10,6.5" fill="white"/>
  </svg>`,
  instagram: `<svg class="badge-icon" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="11" height="11" rx="3" fill="none" stroke="white" stroke-width="1.3"/>
    <circle cx="6.5" cy="6.5" r="2.8" fill="none" stroke="white" stroke-width="1.3"/>
    <circle cx="9.8" cy="3.2" r="1" fill="white"/>
  </svg>`,
  tiktok: `<svg class="badge-icon" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="5" cy="8.5" r="2.2" fill="white"/>
    <rect x="6.8" y="2" width="1.8" height="8" fill="white"/>
    <path d="M8.6,2 Q12,2 12,5.2 Q12,7.5 8.6,7.5" fill="white"/>
  </svg>`,
};

const badgeLabel = { youtube: 'YouTube', instagram: 'Instagram', tiktok: 'TikTok' };

/* ── Render ── */
const grid = document.getElementById('grid');

shorts.forEach((item, i) => {
  const thumb = getThumbnail(item);
  const num   = String(i + 1).padStart(2, '0');

  const thumbContent = thumb
    ? `<img class="thumb-img" src="${thumb}" alt="${item.title}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <div class="thumb-placeholder" style="display:none;">
         <div class="thumb-icon">${placeholderIcons[item.platform] || ''}</div>
         <span class="thumb-number">#${num}</span>
       </div>`
    : `<div class="thumb-placeholder">
         <div class="thumb-icon">${placeholderIcons[item.platform] || ''}</div>
         <span class="thumb-number">#${num}</span>
       </div>`;

  const a = document.createElement('a');
  a.href      = item.url;
  a.target    = '_blank';
  a.rel       = 'noopener noreferrer';
  a.className = 'card';
  a.innerHTML = `
    <div class="card-thumb">
      ${thumbContent}
      <span class="platform-badge badge-${item.platform}">
        ${badgeIcons[item.platform] || ''}${badgeLabel[item.platform]}
      </span>
    </div>
    <div class="card-body">
      <span class="card-title">${item.title}</span>
    </div>
  `;

  grid.appendChild(a);
});
</script>
</body>
</html>
